    <!-- GitHub Pages SPA routing -->
    <script>
      (function() {
        var p = window.location.search.match(/[?&]p=([^&]+)/);
        if (p) {
          var d = decodeURIComponent(p[1]);
          window.history.replaceState(null, null,
            window.location.pathname.slice(0, -1) + '/' + d);
        }
      })();
    </script>
